<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Response Confirmed | Scheduler AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #0F172A;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 3rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 500px;
        }
        h1 { margin-bottom: 1rem; color: #4F46E5; }
        p { color: #94A3B8; margin-bottom: 2rem; }
        .success { color: #10B981; }
        .error { color: #EF4444; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Response Recorded!</h1>
        <p>Thank you for your response. Your status has been updated to:</p>
        <h2 class="{{ status }}">{{ status.upper() }}</h2>
        <p style="margin-top: 2rem; font-size: 0.9em;">You can close this window now.</p>
    </div>
</body>
</html>
